<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Memory: Neon Hologram</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --bg: #010103;
            --accent: #00f2ff;
            --secondary: #7000ff;
            --surface: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 50% 50%, #08081a 0%, #010103 100%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 242, 255, 0.02) 2px, rgba(0, 242, 255, 0.02) 4px);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 10px;
            z-index: 10;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to right, #fff, var(--accent), var(--secondary), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.4));
            letter-spacing: 10px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .display-panel {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            margin-top: 5px;
        }

        #game-container {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 30px;
        }

        @media (min-width: 600px) {
            #game-container { width: 580px; height: 580px; }
        }

        #trace-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(0, 242, 255, 0.05);
            box-shadow: inset 0 0 50px rgba(0, 242, 255, 0.02);
        }

        .segment {
            position: absolute;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5;
            background: transparent;
            filter: drop-shadow(0 0 5px currentColor);
            /* Reduced bobbing to keep laser alignment tighter */
            animation: float 5s ease-in-out infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-50%, -51%) scale(1); }
            to { transform: translate(-50%, -49%) scale(1.02); }
        }

        @media (min-width: 600px) {
            .segment { width: 100px; height: 100px; font-size: 5rem; }
        }

        .segment:hover {
            filter: brightness(1.5) drop-shadow(0 0 20px currentColor);
            transform: translate(-50%, -50%) scale(1.2) rotate(5deg) !important;
            z-index: 15;
        }

        .segment.active {
            transform: translate(-50%, -50%) scale(1.4) !important;
            filter: brightness(2) drop-shadow(0 0 30px currentColor);
            z-index: 20;
            text-shadow: 0 0 20px #fff;
        }

        #center-console {
            position: absolute;
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, #111 0%, #000 100%);
            border-radius: 50%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 60px rgba(0,0,0,1);
        }

        #status-text {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 15px;
            font-family: 'Orbitron';
            letter-spacing: 3px;
        }

        #action-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 2px;
            position: relative;
            transition: all 0.3s;
            overflow: hidden;
        }

        #action-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 30px var(--accent);
        }

        #action-btn::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: -100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        #action-btn:hover::before {
            left: 100%;
        }

        #action-btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
            box-shadow: none;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 5, 0.95);
            border: 1px solid var(--accent);
            padding: 60px;
            z-index: 100;
            text-align: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.5s;
            backdrop-filter: blur(20px);
        }

        .modal.visible {
            visibility: visible;
            opacity: 1;
        }

        .modal h2 { font-family: 'Orbitron'; color: var(--accent); font-size: 3rem; margin: 0; }
        .modal p { color: #888; margin-bottom: 30px; letter-spacing: 1px; }

        .retry-btn {
            background: var(--accent);
            border: none;
            color: black;
            padding: 15px 40px;
            font-family: 'Orbitron';
            font-weight: 900;
            cursor: pointer;
            border-radius: 2px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PI PULSE</h1>
        <div class="display-panel">
            PROGRESS: <span id="progress">0</span>
        </div>
    </div>

    <div id="game-container">
        <canvas id="trace-canvas"></canvas>
        <div class="outer-ring"></div>
        <div id="center-console">
            <div id="status-text">SYSTEM IDLE</div>
            <button id="action-btn">ENGAGE</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <h2 id="modal-title">HALTED</h2>
        <p id="modal-text"></p>
        <button id="close-modal-btn" class="retry-btn">REBOOT</button>
    </div>

    <script>
        const piSequence = [3, 1, 4, 1, 5, 9, 2, 6, 5];
        const colors = [
            '#00f2ff', '#7000ff', '#ff0055',
            '#00ff88', '#ffaa00', '#ffff00',
            '#ff00ff', '#0088ff', '#ffffff'
        ];

        const frequencies = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33];

        const container = document.getElementById('game-container');
        const canvas = document.getElementById('trace-canvas');
        const ctx = canvas.getContext('2d');
        const actionBtn = document.getElementById('action-btn');
        const statusText = document.getElementById('status-text');
        const progressEl = document.getElementById('progress');
        const modal = document.getElementById('modal');

        let audioCtx;
        let currentLevel = 1;
        let playerIdx = 0;
        let isAcceptingInput = false;
        const segmentMap = {};
        let beams = [];

        function resize() {
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        for (let i = 1; i <= 9; i++) {
            const digit = i;
            const angle = (i - 1) * (360 / 9) - 90;
            const radius = 46;

            const seg = document.createElement('div');
            seg.className = 'segment';
            seg.innerText = digit;
            seg.style.color = colors[i-1];

            const x = 50 + radius * Math.cos(angle * Math.PI / 180);
            const y = 50 + radius * Math.sin(angle * Math.PI / 180);
            seg.style.left = `${x}%`;
            seg.style.top = `${y}%`;

            const randomRotation = (Math.random() * 20 - 10).toFixed(1);
            seg.style.transform = `translate(-50%, -50%) rotate(${randomRotation}deg)`;
            seg.style.animationDelay = `${i * 0.2}s`;

            seg.addEventListener('mousedown', () => handleInput(digit));
            seg.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(digit); });

            container.appendChild(seg);

            segmentMap[digit] = {
                el: seg,
                freq: frequencies[i-1],
                color: colors[i-1],
                baseRotation: randomRotation
            };
        }

        // Calculate coordinates and stop at the edge of the floating number
        function getEdgeCoords(fromDigit, toDigit) {
            const rect1 = segmentMap[fromDigit].el.getBoundingClientRect();
            const rect2 = segmentMap[toDigit].el.getBoundingClientRect();
            const cRect = container.getBoundingClientRect();

            const p1 = { x: (rect1.left + rect1.width/2) - cRect.left, y: (rect1.top + rect1.height/2) - cRect.top };
            const p2 = { x: (rect2.left + rect2.width/2) - cRect.left, y: (rect2.top + rect2.height/2) - cRect.top };

            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Offset radius (roughly half the segment width)
            const offset = 40;

            return {
                x1: p1.x + (dx / dist) * offset,
                y1: p1.y + (dy / dist) * offset,
                x2: p2.x - (dx / dist) * offset,
                y2: p2.y - (dy / dist) * offset
            };
        }

        function createBeam(fromDigit, toDigit) {
            const coords = getEdgeCoords(fromDigit, toDigit);
            beams.push({
                ...coords,
                progress: 0,
                color: segmentMap[toDigit].color,
                life: 1.0
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            beams.forEach((beam, index) => {
                const currentX = beam.x1 + (beam.x2 - beam.x1) * beam.progress;
                const currentY = beam.y1 + (beam.y2 - beam.y1) * beam.progress;

                ctx.lineCap = 'round';

                // 1. Draw "Fuzz" (Bloom/Bloom layer)
                ctx.beginPath();
                ctx.strokeStyle = beam.color;
                ctx.lineWidth = 12 * beam.life;
                ctx.globalAlpha = 0.2 * beam.life;
                ctx.shadowBlur = 20;
                ctx.shadowColor = beam.color;
                ctx.moveTo(beam.x1, beam.y1);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();

                // 2. Draw Secondary Glow
                ctx.beginPath();
                ctx.globalAlpha = 0.5 * beam.life;
                ctx.lineWidth = 6 * beam.life;
                ctx.shadowBlur = 0;
                ctx.moveTo(beam.x1, beam.y1);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();

                // 3. Draw Laser Core (Bright White center)
                ctx.beginPath();
                ctx.strokeStyle = '#ffffff';
                ctx.globalAlpha = 0.9 * beam.life;
                ctx.lineWidth = 2 * beam.life;
                ctx.moveTo(beam.x1, beam.y1);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();

                ctx.globalAlpha = 1.0;

                if (beam.progress < 1) {
                    beam.progress += 0.12;
                } else {
                    beam.life -= 0.04;
                }

                if (beam.life <= 0) beams.splice(index, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playNote(digit, duration = 400) {
            if (!audioCtx) return;
            const data = segmentMap[digit];
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(data.freq, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration/1000);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration/1000);

            data.el.classList.add('active');
            setTimeout(() => {
                data.el.classList.remove('active');
            }, duration - 50);
        }

        async function playSequence() {
            isAcceptingInput = false;
            actionBtn.disabled = true;
            statusText.innerText = "TRANSMITTING";
            statusText.style.color = "var(--secondary)";

            await sleep(800);

            for (let i = 0; i < currentLevel; i++) {
                const digit = piSequence[i];
                if (i > 0) createBeam(piSequence[i-1], digit);
                playNote(digit);
                await sleep(550);
            }

            playerIdx = 0;
            isAcceptingInput = true;
            statusText.innerText = "YOUR TURN";
            statusText.style.color = "var(--accent)";
        }

        function handleInput(digit) {
            if (!isAcceptingInput) return;
            const expected = piSequence[playerIdx];

            if (digit === expected) {
                if (playerIdx > 0) createBeam(piSequence[playerIdx-1], digit);
                playNote(digit, 250);
                playerIdx++;

                if (playerIdx === currentLevel) {
                    if (currentLevel === 9) {
                        winGame();
                    } else {
                        currentLevel++;
                        progressEl.innerText = currentLevel - 1;
                        isAcceptingInput = false;
                        statusText.innerText = "SUCCESS";
                        setTimeout(playSequence, 1000);
                    }
                }
            } else {
                failGame();
            }
        }

        function failGame() {
            isAcceptingInput = false;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(110, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(55, audioCtx.currentTime + 0.6);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
            showModal("SYNC ERROR", "Memory corruption detected. Sequence terminated.");
        }

        function winGame() {
            isAcceptingInput = false;
            progressEl.innerText = "9/9";
            showModal("PI MASTERED", "Numerical synchronization complete. You are one with the circle.");
        }

        function showModal(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            modal.classList.add('visible');
        }

        document.getElementById('close-modal-btn').addEventListener('click', () => {
            modal.classList.remove('visible');
            resetGame();
        });

        function resetGame() {
            currentLevel = 1;
            playerIdx = 0;
            progressEl.innerText = "0";
            actionBtn.disabled = false;
            statusText.innerText = "SYSTEM IDLE";
            statusText.style.color = "var(--accent)";
            beams = [];
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        actionBtn.addEventListener('click', () => {
            initAudio();
            playSequence();
        });
    </script>
</body>
</html>
